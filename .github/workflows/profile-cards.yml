name: Generate Profile Cards
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch: {}
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    name: Generate profile summary cards
    steps:
      - name: Generate cards
        uses: vn7n24fzkq/github-profile-summary-cards@release
        with:
          github_token: ${{ secrets.GH_TOKEN }}
          user: anxnt-goyl
          theme: github_dark